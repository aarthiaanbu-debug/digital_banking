<h2>📊 Transaction History</h2>

<table border="1">
<tr>
    <th>Sender</th>
    <th>Receiver</th>
    <th>Amount</th>
</tr>

{% for t in txns %}
<tr>
    <td>{{ t.sender.username }}</td>
    <td>{{ t.receiver.username }}</td>
    <td>{{ t.amount }}</td>
</tr>
{% empty %}
<tr>
    <td colspan="3">No transactions</td>
</tr>
{% endfor %}
</table>
